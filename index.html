<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Steampunk Airship</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1520; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(200,160,100,0.5); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(180,140,80,0.5); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">⚙️ STEAMPUNK AIRSHIP 🚀</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1520);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 5, 30);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.1;
controls.maxPolarAngle = Math.PI * 0.7;
controls.minDistance = 10;
controls.maxDistance = 60;

const composer = new EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.8, 0.4, 0.1));

scene.add(new THREE.AmbientLight(0x2a1a10, 0.4));
const sunLight = new THREE.DirectionalLight(0xffddaa, 0.8);
sunLight.position.set(20, 30, 10);
scene.add(sunLight);

// Clouds below
for (let c = 0; c < 30; c++) {
  const cloudGeo = new THREE.SphereGeometry(3 + Math.random() * 4, 12, 8);
  const cloudMat = new THREE.MeshStandardMaterial({ color: 0x8888aa, roughness: 1.0, transparent: true, opacity: 0.8 });
  const cloud = new THREE.Mesh(cloudGeo, cloudMat);
  cloud.position.set((Math.random() - 0.5) * 100, -15 - Math.random() * 10, (Math.random() - 0.5) * 100);
  cloud.scale.y = 0.4;
  scene.add(cloud);
}

// Airship group
const airship = new THREE.Group();

// Main hull
const hullMat = new THREE.MeshStandardMaterial({ color: 0x8b6914, roughness: 0.7, metalness: 0.3 });
const hull = new THREE.Mesh(new THREE.CylinderGeometry(2, 3, 12, 16), hullMat);
hull.rotation.x = Math.PI / 2;
airship.add(hull);

// Front cone
const nose = new THREE.Mesh(new THREE.ConeGeometry(2, 4, 16), hullMat);
nose.rotation.x = -Math.PI / 2;
nose.position.z = -8;
airship.add(nose);

// Gondola
const gondolaMat = new THREE.MeshStandardMaterial({ color: 0x4a3020, roughness: 0.8, metalness: 0.2 });
const gondola = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 6), gondolaMat);
gondola.position.y = -4;
airship.add(gondola);

// Windows
for (let w = 0; w < 5; w++) {
  const winMat = new THREE.MeshStandardMaterial({ color: 0xffcc88, emissive: 0xffaa44, emissiveIntensity: 0.5 });
  const win = new THREE.Mesh(new THREE.CircleGeometry(0.3, 8), winMat);
  win.position.set(0, -3.75, -2 + w * 1.2);
  airship.add(win);
}

// Propellers
for (let side of [-1.5, 1.5]) {
  const propGroup = new THREE.Group();
  
  // Propeller hub
  propGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 6), hullMat));
  
  // Blades
  for (let b = 0; b < 4; b++) {
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2, 0.3), hullMat);
    blade.rotation.z = (b / 4) * Math.PI * 2;
    blade.position.y = Math.sin(blade.rotation.z) * 1;
    blade.position.x = Math.cos(blade.rotation.z) * 1;
    propGroup.add(blade);
  }
  
  propGroup.position.set(side, -4, 2);
  propGroup.userData.isProp = true;
  airship.add(propGroup);
}

// Engine exhausts
for (let e = 0; e < 3; e++) {
  const exhaust = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.5, 1.5, 8),
    new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8, metalness: 0.5 })
  );
  exhaust.position.set(0, -3.5, 3 + e * 0.8);
  airship.add(exhaust);
  
  // Steam puff
  const puffMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.4 });
  const puff = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 8), puffMat);
  puff.position.set(0, -3.5, 3.8 + e * 0.8);
  puff.userData.isPuff = true;
  airship.add(puff);
}

// Deck
const deck = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.2, 7), gondolaMat);
deck.position.y = -2.9;
airship.add(deck);

// Railings
for (let r = 0; r < 8; r++) {
  const angle = (r / 8) * Math.PI * 2;
  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1, 6), new THREE.MeshStandardMaterial({ color: 0x886622, metalness: 0.8 }));
  post.position.set(Math.cos(angle) * 1.6, -2.3, Math.sin(angle) * 3.3);
  airship.add(post);
}

// Captain's wheel
const wheel = new THREE.Mesh(
  new THREE.TorusGeometry(0.6, 0.08, 8, 16),
  new THREE.MeshStandardMaterial({ color: 0x886622, metalness: 0.8, roughness: 0.3 })
);
wheel.position.set(0, -1.5, -2);
wheel.rotation.x = Math.PI / 2;
airship.add(wheel);

// Flags
const flagPole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 2, 6), new THREE.MeshStandardMaterial({ color: 0x886622, metalness: 0.8 }));
flagPole.position.set(0, -1.5, -3.5);
airship.add(flagPole);

// Banner flag
const flagMat = new THREE.MeshStandardMaterial({ color: 0xcc2200, roughness: 0.9, side: THREE.DoubleSide });
const flag = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.6), flagMat);
flag.position.set(0.5, -0.4, -3.5);
flag.userData.isFlag = true;
airship.add(flag);

// Rivets
for (let v = 0; v < 40; v++) {
  const rivet = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 6, 4),
    new THREE.MeshStandardMaterial({ color: 0xaa8833, metalness: 0.9, roughness: 0.3 })
  );
  const theta = Math.random() * Math.PI * 2;
  const lat = (Math.random() - 0.5) * Math.PI;
  rivet.position.set(
    Math.cos(theta) * Math.cos(lat) * 2.5,
    Math.sin(lat) * 2.5,
    Math.cos(lat) * (Math.random() > 0.5 ? 6 : -6)
  );
  airship.add(rivet);
}

airship.position.set(0, 0, 0);
scene.add(airship);

// Ground far below
{
  const groundGeo = new THREE.PlaneGeometry(200, 200, 20, 20);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a3a1a, roughness: 0.95 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -50;
  scene.add(ground);
}

// Second airship in distance
const airship2 = airship.clone();
airship2.position.set(-30, 10, -40);
airship2.scale.setScalar(0.5);
scene.add(airship2);

// Clouds around
for (let c = 0; c < 20; c++) {
  const cloudGeo = new THREE.SphereGeometry(2 + Math.random() * 3, 10, 6);
  const cloudMat = new THREE.MeshStandardMaterial({ color: 0xaaaacc, roughness: 1.0, transparent: true, opacity: 0.6 });
  const cloud = new THREE.Mesh(cloudGeo, cloudMat);
  cloud.position.set((Math.random() - 0.5) * 80, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 80);
  cloud.scale.y = 0.35;
  scene.add(cloud);
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  airship.position.y = Math.sin(t * 0.5) * 0.5;
  airship.rotation.z = Math.sin(t * 0.3) * 0.05;
  
  scene.traverse(obj => {
    if (obj.userData.isProp) {
      obj.rotation.z = t * 10;
    }
    if (obj.userData.isPuff) {
      const baseScale = 0.5 + (Math.sin(t * 3 + obj.position.z) * 0.3 + 0.5);
      obj.scale.setScalar(baseScale);
      obj.material.opacity = 0.3 + Math.sin(t * 4 + obj.position.z) * 0.15;
    }
    if (obj.userData.isFlag) {
      obj.rotation.y = Math.sin(t * 2) * 0.3;
    }
  });
  
  controls.update();
  composer.render();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
